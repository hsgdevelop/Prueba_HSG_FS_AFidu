server {
    listen 80;
    server_name localhost;

    # Raíz donde nginx busca los archivos de la build de Angular
    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------
    # Proxy inverso: las llamadas a /api/** se redirigen al
    # contenedor "backend" en el puerto 8080.
    # Esto permite que el frontend llame rutas relativas
    # (/api/clients) sin exponer el backend directamente
    # al exterior cuando se ajuste environment.prod.ts.
    # -------------------------------------------------------
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # -------------------------------------------------------
    # SPA fallback — todas las rutas desconocidas redirigen
    # a index.html para que el router de Angular las maneje
    # -------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cabeceras de caché para assets estáticos de Angular
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
